<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignment 2 – Accuracy & Confusion Matrix</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <a href="../../index.html" class="back">← Practical 8</a>
    <div class="tag">Assignment 02</div>
    <h1>Accuracy & Confusion Matrix</h1>
    <p>Evaluate classifier accuracy and generate confusion matrix · CO4 – Create</p>
  </header>

  <div class="layout">
    <div class="panel">
      <div class="win-bar">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span>confusion_matrix.js</span>
        <span id="liveDot" class="ldot off">●</span>
      </div>
      <div class="feed-wrap">
        <video id="video" autoplay playsinline muted></video>
      </div>

      <div class="phase-tabs">
        <button class="phase-btn active" id="tabTrain" onclick="setPhase('train')">📥 Train</button>
        <button class="phase-btn" id="tabVal"   onclick="setPhase('val')">🧪 Validate</button>
      </div>

      <div id="trainPhase">
        <div class="class-btns">
          <button class="class-btn c0" onmousedown="capture(0)" onmouseup="stopCap()" ontouchstart="capture(0)" ontouchend="stopCap()">Hold: 🍎<br/><span id="tc0">0</span></button>
          <button class="class-btn c1" onmousedown="capture(1)" onmouseup="stopCap()" ontouchstart="capture(1)" ontouchend="stopCap()">Hold: 🍌<br/><span id="tc1">0</span></button>
          <button class="class-btn c2" onmousedown="capture(2)" onmouseup="stopCap()" ontouchstart="capture(2)" ontouchend="stopCap()">Hold: 🍊<br/><span id="tc2">0</span></button>
        </div>
        <div class="btn-row">
          <button class="btn" id="trainBtn" onclick="train()" disabled>⚡ Train</button>
        </div>
      </div>

      <div id="valPhase" style="display:none">
        <div class="class-btns">
          <button class="class-btn c0" onmousedown="validate(0)" onmouseup="stopCap()" ontouchstart="validate(0)" ontouchend="stopCap()">Val: 🍎<br/><span id="vc0">0</span></button>
          <button class="class-btn c1" onmousedown="validate(1)" onmouseup="stopCap()" ontouchstart="validate(1)" ontouchend="stopCap()">Val: 🍌<br/><span id="vc1">0</span></button>
          <button class="class-btn c2" onmousedown="validate(2)" onmouseup="stopCap()" ontouchstart="validate(2)" ontouchend="stopCap()">Val: 🍊<br/><span id="vc2">0</span></button>
        </div>
        <div class="btn-row">
          <button class="btn" id="evalBtn" onclick="evaluate()" disabled>📊 Generate Report</button>
        </div>
      </div>
    </div>

    <div class="panel side-panel">
      <h2>Evaluation Report</h2>

      <div class="accuracy-box">
        <div class="acc-label">OVERALL ACCURACY</div>
        <div id="overallAcc" class="acc-val">--</div>
      </div>

      <div class="cm-section">
        <div class="cm-label">CONFUSION MATRIX</div>
        <div id="cmGrid" class="cm-grid">
          <div class="cm-waiting">Train → Validate → Generate Report</div>
        </div>
      </div>

      <div class="per-class" id="perClass"></div>

      <div class="log-box" id="log"><div class="ll">Ready.</div></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
