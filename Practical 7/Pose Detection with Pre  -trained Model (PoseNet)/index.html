<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pose Detection (PoseNet)</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.1"></script>

<style>
    body {
        margin: 0;
        background: linear-gradient(135deg, #001f4d, #003b8e);
        font-family: 'Segoe UI', sans-serif;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: rgba(255,255,255,0.10);
        padding: 25px;
        width: 430px;
        border-radius: 18px;
        backdrop-filter: blur(15px);
        box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
        text-align: center;
    }

    video, canvas {
        width: 380px;
        height: 280px;
        border-radius: 12px;
        border: 2px solid rgba(255,255,255,0.4);
        margin-top: 8px;
    }
</style>
</head>
<body>

<div class="card">
    <h2>Pose Detection (PoseNet)</h2>
    <p id="status">Loading PoseNet...</p>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
