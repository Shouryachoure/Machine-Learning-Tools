<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentiment Analysis – Dense Network</title>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>

<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #0a2cc7, #1f7fff, #52b2ff);
        background-size: cover;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 30px;
        font-size: 32px;
        text-shadow: 0px 4px 20px rgba(0,0,0,0.3);
    }

    .card {
        margin: 40px auto;
        width: 600px;
        padding: 30px;
        border-radius: 18px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        animation: fadeIn 1.2s ease;
    }

    textarea {
        width: 90%;
        height: 120px;
        padding: 15px;
        border-radius: 12px;
        border: none;
        outline: none;
        font-size: 16px;
    }

    button {
        margin-top: 20px;
        padding: 12px 28px;
        border: none;
        border-radius: 50px;
        font-size: 18px;
        cursor: pointer;
        background: white;
        color: #0a2cc7;
        font-weight: 600;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        background: #e5f0ff;
    }

    #output {
        margin-top: 25px;
        font-size: 22px;
        font-weight: bold;
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<h1>Sentiment Analysis (Dense Neural Network)</h1>

<div class="card">
    <h3>Enter Text</h3>
    <textarea id="inputText" placeholder="Type something..."></textarea><br>
    <button onclick="analyze()">Analyze</button>

    <div id="output"></div>
</div>

<script src="script.js"></script>

</body>
</html>
