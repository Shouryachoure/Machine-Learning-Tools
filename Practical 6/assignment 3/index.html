<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentiment Analysis – RNN (LSTM)</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>

<style>
    body {
        margin: 0;
        font-family: Poppins, sans-serif;
        background: linear-gradient(120deg, #2b00ff, #0061ff, #00b7ff);
        min-height: 100vh;
        color: white;
        text-align: center;
    }

    h1 { margin-top: 35px; font-size: 36px; }

    .box {
        margin: 45px auto;
        width: 650px;
        padding: 35px;
        border-radius: 22px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    textarea {
        width: 90%;
        height: 120px;
        padding: 14px;
        border-radius: 12px;
        border: none;
        font-size: 18px;
    }

    button {
        margin-top: 20px;
        padding: 14px 40px;
        border-radius: 35px;
        font-size: 20px;
        background: white;
        color: #2500ff;
        border: none;
        cursor: pointer;
    }

    #result { margin-top: 20px; font-size: 26px; font-weight: bold; }
</style>
</head>

<body>
<h1>Sentiment Analysis (LSTM – RNN Model)</h1>

<div class="box">
    <textarea id="inputText" placeholder="Write something..."></textarea>
    <button onclick="analyze()">Analyze</button>
    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
