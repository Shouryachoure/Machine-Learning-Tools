<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentiment Analysis – Dense Classifier</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>

<style>
    body {
        margin: 0;
        font-family: Poppins, sans-serif;
        background: linear-gradient(135deg, #0047ff, #008cff, #00d0ff);
        min-height: 100vh;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 35px;
        font-size: 36px;
        text-shadow: 0 5px 20px rgba(0,0,0,0.35);
    }

    .card {
        margin: 45px auto;
        width: 650px;
        padding: 35px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 35px rgba(0,0,0,0.3);
    }

    textarea {
        width: 90%;
        height: 120px;
        padding: 15px;
        border-radius: 12px;
        border: none;
        outline: none;
        font-size: 18px;
    }

    button {
        margin-top: 20px;
        padding: 14px 40px;
        border-radius: 35px;
        font-size: 20px;
        background: white;
        color: #0047ff;
        font-weight: 600;
        border: none;
        cursor: pointer;
    }

    #output {
        margin-top: 25px;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>

<body>
<h1>Sentiment Analysis (Simple Dense Network)</h1>

<div class="card">
    <textarea id="input" placeholder="Type a sentence..."></textarea>
    <button onclick="analyze()">Analyze</button>
    <div id="output"></div>
</div>

<script src="script.js"></script>
</body>
</html>
