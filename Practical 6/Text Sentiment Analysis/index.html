<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Sentiment Analysis</title>

<!-- TFJS CDN -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>

<!-- Clean UI -->
<style>
    body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f6fa;
        padding: 40px;
        text-align: center;
    }
    .container {
        width: 500px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
    }
    textarea {
        width: 90%;
        height: 120px;
        font-size: 16px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
    }
    button {
        margin-top: 15px;
        padding: 12px 22px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #007bff;
        color: white;
        transition: 0.3s;
    }
    button:hover {
        background: #0056b3;
    }
    #result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }
</style>

</head>

<body>

<h1>Text Sentiment Analysis</h1>

<div class="container">
    <textarea id="inputText" placeholder="Enter your sentence here..."></textarea>
    <br>
    <button onclick="analyze()">Analyze Sentiment</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
