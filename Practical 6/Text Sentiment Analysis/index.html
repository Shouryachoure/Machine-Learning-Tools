<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pose Detection Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <h1>Pose Detection Dashboard</h1>
    <p>Real-time human pose tracking using PoseNet</p>
  </header>

  <div class="dashboard">

    <!-- LEFT: VIDEO -->
    <div class="card video-card">
      <div class="card-header">Live Camera</div>

      <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
      </div>

      <div class="controls">
        <button class="start" onclick="startCamera()">Start</button>
        <button class="stop" onclick="stopCamera()">Stop</button>
      </div>
    </div>

    <!-- RIGHT: PANEL -->
    <div class="card side-panel">

      <div class="card-header">Live Info</div>
      <p id="poseCount">Poses Detected: 0</p>

      <div class="divider"></div>

      <div class="card-header">Settings</div>

      <label>Confidence</label>
      <input type="range" id="confidence" min="0" max="1" step="0.1" value="0.5">

      <label>Mode</label>
      <select id="mode">
        <option value="single">Single Pose</option>
        <option value="multi">Multi Pose</option>
      </select>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
<script src="script.js"></script>

</body>
</html>
